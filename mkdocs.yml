site_name: Nginx Proxy Manager SDK for Python
site_url: https://example.invalid/nginx-proxy-manager-sdk-python
theme:
  name: material
nav:
  - Home: index.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
markdown_extensions:
  - admonition
  - toc:
      permalink: true
